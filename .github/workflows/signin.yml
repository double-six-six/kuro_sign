name: KuroBBS Auto SignIn

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  signin:
    runs-on: ubuntu-latest
    
    env:
      TZ: Asia/Shanghai
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pyyaml requests pytz httpx
      
      - name: Create config directory
        run: |
          mkdir -p config log
      
      - name: Create user config
        env:
          KURO_TOKEN: ${{ secrets.KURO_TOKEN }}
          KURO_USERNAME: ${{ secrets.KURO_USERNAME }}
          AUTO_REPLENISH: ${{ secrets.AUTO_REPLENISH || 'true' }}
        run: |
          cat > config/${KURO_USERNAME}.yaml << EOF
          enable: true
          token: ${KURO_TOKEN}
          completed: false
          auto_reple_sign: ${AUTO_REPLENISH}
          retry_times: 3
          game_info: {}
          user_info: {}
          EOF
      
      - name: Create push config
        env:
          PUSH_ENABLE: ${{ secrets.PUSH_ENABLE }}
          PUSH_SERVER: ${{ secrets.PUSH_SERVER }}
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
          PUSH_LEVEL: ${{ secrets.PUSH_LEVEL || '2' }}
        run: |
          if [ "${PUSH_ENABLE}" = "true" ] && [ -n "${PUSH_SERVER}" ] && [ -n "${PUSH_TOKEN}" ]; then
            cat > config/push.ini << EOF
            [setting]
            enable = true
            push_level = ${PUSH_LEVEL}
            push_server = ${PUSH_SERVER}
            
            [${PUSH_SERVER}]
            push_token = ${PUSH_TOKEN}
            EOF
            echo "✅ 推送配置文件已创建"
            cat config/push.ini
          else
            echo "⚠️ 推送未启用或配置不完整，跳过"
          fi
      
      - name: Run signin script
        run: python main.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signin-logs
          path: log/
          retention-days: 7
