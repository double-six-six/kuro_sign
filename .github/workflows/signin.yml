name: KuroBBS Auto SignIn

on:
  schedule:
    - cron: '0 16 * * *'  # 北京时间 9:30
  workflow_dispatch:

jobs:
  signin:
    runs-on: ubuntu-latest
    
    env:
      TZ: Asia/Shanghai
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pyyaml requests pytz httpx
      
      - name: Create config directory
        run: |
          mkdir -p config log
      
      - name: Create user config
        env:
          KURO_TOKEN: ${{ secrets.KURO_TOKEN }}
          KURO_USERNAME: ${{ secrets.KURO_USERNAME }}
          AUTO_REPLENISH: ${{ secrets.AUTO_REPLENISH || 'true' }}
        run: |
          cat > config/${KURO_USERNAME}.yaml << EOF
          enable: true
          token: ${KURO_TOKEN}
          completed: false
          auto_reple_sign: ${AUTO_REPLENISH}
          retry_times: 3
          game_info: {}
          user_info: {}
          EOF
      
      - name: Create push config for Server酱
        if: secrets.PUSH_ENABLE == 'true'
        env:
          PUSH_SERVER: ${{ secrets.PUSH_SERVER }}
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
          PUSH_LEVEL: ${{ secrets.PUSH_LEVEL || '2' }}
        run: |
          cat > config/push.ini << EOF
          [setting]
          enable = true
          push_level = ${PUSH_LEVEL}
          push_server = ${PUSH_SERVER}
          
          [${PUSH_SERVER}]
          push_token = ${PUSH_TOKEN}
          EOF
          echo "推送配置文件已创建"
      
      - name: Run signin script
        run: python main.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signin-logs
          path: log/
          retention-days: 7
