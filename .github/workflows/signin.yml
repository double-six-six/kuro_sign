name: KuroBBS Auto SignIn

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: '启用调试模式'
        required: false
        default: false
        type: boolean

jobs:
  signin:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pyyaml requests pytz httpx
          if [ -f "pyproject.toml" ]; then
            pip install -e .
          fi
      
      - name: 创建配置目录
        run: mkdir -p config log
      
      - name: 创建用户配置文件
        env:
          USER_NAME: ${{ secrets.USER_NAME }}
          USER_TOKEN: ${{ secrets.USER_TOKEN }}
          AUTO_REPLENISH: ${{ secrets.AUTO_REPLENISH || 'true' }}
          RETRY_TIMES: ${{ secrets.RETRY_TIMES || '3' }}
        run: |
          cat > config/${USER_NAME}.yaml << EOF
          enable: true
          token: ${USER_TOKEN}
          completed: false
          auto_reple_sign: ${AUTO_REPLENISH}
          retry_times: ${RETRY_TIMES}
          game_info:
            distinct_id: ""
            devcode: ""
            wwroleId: ""
            eeeroleId: ""
          user_info:
            userId: ""
          EOF
          
          echo "用户配置文件已创建: config/${USER_NAME}.yaml"
      
      - name: 创建多用户配置文件
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
        run: |
          if [ -n "$USERS_JSON" ]; then
            echo '$USERS_JSON' | jq -c '.[]' 2>/dev/null | while read -r user; do
              username=$(echo "$user" | jq -r '.username')
              token=$(echo "$user" | jq -r '.token')
              auto_replenish=$(echo "$user" | jq -r '.auto_replenish // "true"')
              retry_times=$(echo "$user" | jq -r '.retry_times // "3"')
              
              cat > "config/${username}.yaml" << EOF
              enable: true
              token: ${token}
              completed: false
              auto_reple_sign: ${auto_replenish}
              retry_times: ${retry_times}
              game_info:
                distinct_id: ""
                devcode: ""
                wwroleId: ""
                eeeroleId: ""
              user_info:
                userId: ""
              EOF
              echo "已创建: config/${username}.yaml"
            done
          fi
      
      - name: 创建 Qmsg 推送配置文件
        env:
          PUSH_ENABLE: ${{ secrets.PUSH_ENABLE }}
          PUSH_LEVEL: ${{ secrets.PUSH_LEVEL || '1' }}
          QMSG_KEY: ${{ secrets.QMSG_KEY }}
        run: |
          if [ "$PUSH_ENABLE" = "true" ] && [ -n "$QMSG_KEY" ]; then
            cat > config/push.ini << EOF
            [setting]
            enable = true
            push_level = ${PUSH_LEVEL}
            push_server = qmsg
            push_block_keys =
            
            [qmsg]
            key = ${QMSG_KEY}
            EOF
            echo "Qmsg 推送配置文件已创建"
          else
            echo "推送未启用或 QMSG_KEY 未设置，跳过创建 push.ini"
          fi
      
      - name: 调试 - 查看配置文件
        if: github.event.inputs.debug == 'true'
        run: |
          echo "=== 配置文件列表 ==="
          ls -la config/
          echo "=== push.ini 内容 ==="
          cat config/push.ini 2>/dev/null || echo "push.ini 不存在"
          echo "=== 用户配置内容（隐藏token）==="
          for f in config/*.yaml; do
            echo "--- $f ---"
            grep -v "token:" "$f" 2>/dev/null || cat "$f"
          done
      
      - name: 执行签到
        run: |
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            python main.py --debug
          else
            python main.py
          fi
      
      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signin-logs-${{ github.run_id }}
          path: log/
          retention-days: 7
