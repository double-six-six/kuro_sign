name: Kuro Auto Signin

on:
  schedule:
    # 每天北京时间 08:00 执行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  signin:
    name: 库洛游戏签到
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install requests
      
      - name: 执行签到
        env:
          KURO_TOKEN: ${{ secrets.KURO_TOKEN }}
          SIGN_TYPE: ${{ secrets.SIGN_TYPE }}
        run: |
          python scripts/signin.py
